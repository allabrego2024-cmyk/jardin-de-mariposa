<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mariposa Morpho 3D Ultra Detallada - Transición</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #2b32b2, #141e30);
      overflow: hidden;
      cursor: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .wrapper {
      position: absolute;
      width: 450px;
      height: 450px;
      pointer-events: none;
      will-change: transform, opacity, filter;
      opacity: 0;
      /* Animación modificada para aparecer y luego desvanecerse en la oscuridad */
      animation: appearAndFade 8s ease-in-out forwards;
    }

    .butterfly {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      animation: float 3s ease-in-out infinite;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* --- ALAS --- */
    .wing-wrapper {
      position: absolute;
      top: 90px;
      width: 225px;
      height: 337px;
      transform-style: preserve-3d;
    }

    .wing-left {
      right: 50%;
      margin-right: 20px;
      transform-origin: right center;
      animation: flap-left 0.3s ease-in-out infinite alternate;
    }

    .wing-right {
      left: 50%;
      margin-left: 20px;
      transform-origin: left center;
      animation: flap-right 0.3s ease-in-out infinite alternate;
    }

    .wing-mirror {
      width: 100%;
      height: 100%;
      position: relative;
    }
    .wing-left .wing-mirror {
      transform: scaleX(-1);
    }

    /* --- ALA SUPERIOR ULTRA DETALLADA --- */
    .wing-top {
      position: absolute;
      top: -90px;
      width: 225px;
      height: 225px;
      background: 
        radial-gradient(circle at 85% 15%, #fff 5px, transparent 6px),
        radial-gradient(circle at 88% 22%, #fff 4px, transparent 5px),
        radial-gradient(circle at 90% 30%, #fff 5px, transparent 6px),
        radial-gradient(circle at 92% 38%, #fff 4px, transparent 5px),
        radial-gradient(circle at 91% 45%, #fff 5px, transparent 6px),
        radial-gradient(circle at 90% 52%, #fff 4px, transparent 5px),
        radial-gradient(circle at 88% 60%, #fff 5px, transparent 6px),
        radial-gradient(circle at 85% 68%, #fff 4px, transparent 5px),
        radial-gradient(circle at 82% 75%, #fff 5px, transparent 6px),
        radial-gradient(circle at 80% 25%, #000 8px, transparent 10px),
        radial-gradient(circle at 85% 40%, #000 10px, transparent 12px),
        radial-gradient(circle at 83% 55%, #000 9px, transparent 11px),
        radial-gradient(circle at 78% 70%, #000 8px, transparent 10px),
        radial-gradient(circle at 70% 45%, #fff 3px, #000 5px, #00f2ff 8px, #0099ff 12px, #0072ff 18px, #003399 25px, transparent 35px),
        radial-gradient(circle at 60% 65%, #fff 2px, #000 4px, #00f2ff 6px, #0072ff 10px, transparent 15px),
        radial-gradient(circle at 80% 30%, #00f2ff 4px, #0072ff 7px, transparent 12px),
        linear-gradient(45deg, transparent 47%, rgba(0, 0, 0, 0.5) 48%, rgba(0, 0, 0, 0.5) 52%, transparent 53%),
        linear-gradient(-30deg, transparent 47%, rgba(0, 0, 0, 0.45) 48%, rgba(0, 0, 0, 0.45) 52%, transparent 53%),
        linear-gradient(80deg, transparent 47%, rgba(0, 0, 0, 0.4) 48%, rgba(0, 0, 0, 0.4) 52%, transparent 53%),
        linear-gradient(120deg, transparent 47%, rgba(0, 0, 0, 0.35) 48%, rgba(0, 0, 0, 0.35) 52%, transparent 53%),
        linear-gradient(60deg, transparent 48.5%, rgba(0, 0, 0, 0.25) 49%, rgba(0, 0, 0, 0.25) 51%, transparent 51.5%),
        linear-gradient(-15deg, transparent 48.5%, rgba(0, 0, 0, 0.2) 49%, rgba(0, 0, 0, 0.2) 51%, transparent 51.5%),
        linear-gradient(100deg, transparent 48.5%, rgba(0, 0, 0, 0.22) 49%, rgba(0, 0, 0, 0.22) 51%, transparent 51.5%),
        linear-gradient(30deg, transparent 48.5%, rgba(0, 0, 0, 0.18) 49%, rgba(0, 0, 0, 0.18) 51%, transparent 51.5%),
        linear-gradient(75deg, transparent 49%, rgba(0, 0, 0, 0.12) 49.5%, rgba(0, 0, 0, 0.12) 50.5%, transparent 51%),
        linear-gradient(-45deg, transparent 49%, rgba(0, 0, 0, 0.1) 49.5%, rgba(0, 0, 0, 0.1) 50.5%, transparent 51%),
        linear-gradient(135deg, transparent 49%, rgba(0, 0, 0, 0.11) 49.5%, rgba(0, 0, 0, 0.11) 50.5%, transparent 51%),
        radial-gradient(circle at 60% 40%, #00f2ff 0%, #00ccff 15%, #0099ff 30%, #0072ff 45%, #0055cc 60%, #003399 75%, #001a66 90%, #000 100%);
      border-radius: 80% 20% 60% 20%;
      border: 9px solid #000;
      box-shadow: 
        0 0 45px rgba(0, 242, 255, 0.8),
        inset 0 0 67px rgba(0, 242, 255, 0.4),
        inset 0 0 100px rgba(0, 153, 255, 0.2);
      transition: box-shadow 0.5s ease-in-out, filter 0.5s ease-in-out;
      overflow: hidden;
    }

    .wing-top::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        linear-gradient(135deg, transparent 0%, rgba(255, 255, 255, 0.4) 25%, rgba(0, 242, 255, 0.3) 40%, transparent 55%, rgba(0, 242, 255, 0.5) 75%, transparent 100%),
        linear-gradient(45deg, transparent 0%, rgba(0, 153, 255, 0.3) 30%, transparent 60%, rgba(255, 255, 255, 0.2) 80%, transparent 100%);
      border-radius: inherit;
      animation: shimmer 3s ease-in-out infinite;
    }

    .wing-top::after {
      content: '';
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      bottom: 12px;
      border: 4.5px solid rgba(0, 242, 255, 0.6);
      border-radius: inherit;
      box-shadow: inset 0 0 33px rgba(0, 242, 255, 0.4), inset 0 0 60px rgba(0, 153, 255, 0.2);
      background: 
        radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.05) 2px, transparent 3px),
        radial-gradient(circle at 70% 70%, rgba(255, 255, 255, 0.05) 2px, transparent 3px);
    }

    /* --- ALA INFERIOR ULTRA DETALLADA --- */
    .wing-bottom {
      position: absolute;
      top: 90px;
      width: 180px;
      height: 202px;
      background: 
        radial-gradient(circle at 25% 25%, #00f2ff 7px, transparent 9px),
        radial-gradient(circle at 35% 35%, #00f2ff 5px, transparent 7px),
        radial-gradient(circle at 45% 30%, #00f2ff 6px, transparent 8px),
        radial-gradient(circle at 55% 45%, #00f2ff 5px, transparent 7px),
        radial-gradient(circle at 65% 35%, #00f2ff 6px, transparent 8px),
        radial-gradient(circle at 75% 50%, #00f2ff 5px, transparent 7px),
        radial-gradient(circle at 30% 55%, #00f2ff 6px, transparent 8px),
        radial-gradient(circle at 40% 65%, #00f2ff 5px, transparent 7px),
        radial-gradient(circle at 50% 75%, #00f2ff 6px, transparent 8px),
        radial-gradient(circle at 60% 70%, #00f2ff 5px, transparent 7px),
        radial-gradient(circle at 40% 40%, rgba(0, 0, 0, 0.4) 10px, transparent 12px),
        radial-gradient(circle at 60% 60%, rgba(0, 0, 0, 0.35) 12px, transparent 14px),
        radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0.3) 8px, transparent 10px),
        radial-gradient(circle at 70% 70%, #fff 2px, #000 4px, #00f2ff 7px, #0072ff 11px, transparent 16px),
        linear-gradient(60deg, transparent 47%, rgba(0, 0, 0, 0.45) 48%, rgba(0, 0, 0, 0.45) 52%, transparent 53%),
        linear-gradient(-45deg, transparent 47%, rgba(0, 0, 0, 0.4) 48%, rgba(0, 0, 0, 0.4) 52%, transparent 53%),
        linear-gradient(90deg, transparent 47%, rgba(0, 0, 0, 0.35) 48%, rgba(0, 0, 0, 0.35) 52%, transparent 53%),
        linear-gradient(75deg, transparent 48.5%, rgba(0, 0, 0, 0.25) 49%, rgba(0, 0, 0, 0.25) 51%, transparent 51.5%),
        linear-gradient(-30deg, transparent 48.5%, rgba(0, 0, 0, 0.22) 49%, rgba(0, 0, 0, 0.22) 51%, transparent 51.5%),
        linear-gradient(120deg, transparent 48.5%, rgba(0, 0, 0, 0.2) 49%, rgba(0, 0, 0, 0.2) 51%, transparent 51.5%),
        linear-gradient(45deg, transparent 49%, rgba(0, 0, 0, 0.12) 49.5%, rgba(0, 0, 0, 0.12) 50.5%, transparent 51%),
        linear-gradient(-60deg, transparent 49%, rgba(0, 0, 0, 0.1) 49.5%, rgba(0, 0, 0, 0.1) 50.5%, transparent 51%),
        radial-gradient(circle at 50% 50%, #00f2ff 0%, #00ccff 20%, #0099ff 35%, #0072ff 50%, #0055cc 65%, #003399 80%, #1a0b2e 100%);
      border-radius: 20% 80% 50% 60%;
      border: 9px solid #000;
      box-shadow: 
        0 0 33px rgba(0, 198, 255, 0.7),
        inset 0 0 45px rgba(0, 198, 255, 0.3),
        inset 0 0 80px rgba(0, 153, 255, 0.15);
      transition: box-shadow 0.5s ease-in-out, filter 0.5s ease-in-out;
      overflow: hidden;
    }

    .wing-bottom::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 15% 15%, rgba(255, 255, 255, 0.15) 2px, transparent 2px),
        radial-gradient(circle at 25% 25%, rgba(255, 255, 255, 0.12) 2px, transparent 2px),
        radial-gradient(circle at 35% 35%, rgba(255, 255, 255, 0.15) 2px, transparent 2px),
        radial-gradient(circle at 45% 45%, rgba(255, 255, 255, 0.12) 2px, transparent 2px),
        radial-gradient(circle at 55% 55%, rgba(255, 255, 255, 0.15) 2px, transparent 2px),
        radial-gradient(circle at 65% 65%, rgba(255, 255, 255, 0.12) 2px, transparent 2px),
        radial-gradient(circle at 75% 75%, rgba(255, 255, 255, 0.15) 2px, transparent 2px),
        radial-gradient(circle at 85% 85%, rgba(255, 255, 255, 0.12) 2px, transparent 2px);
      background-size: 28px 28px;
      border-radius: inherit;
    }

    .wing-bottom::after {
      content: '';
      position: absolute;
      top: 9px;
      left: 9px;
      right: 9px;
      bottom: 9px;
      border: 3.375px solid rgba(0, 242, 255, 0.5);
      border-radius: inherit;
      box-shadow: inset 0 0 25px rgba(0, 242, 255, 0.3), inset 0 0 50px rgba(0, 153, 255, 0.15);
    }

    .butterfly:hover .wing-top,
    .butterfly:hover .wing-bottom {
      box-shadow: 
        0 0 90px rgba(0, 242, 255, 1),
        0 0 180px rgba(0, 242, 255, 0.8),
        inset 0 0 90px rgba(0, 242, 255, 0.6),
        inset 0 0 150px rgba(0, 153, 255, 0.4);
      filter: brightness(1.5) saturate(1.4) contrast(1.1);
    }

    /* --- CUERPO --- */
    .body-part {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(to bottom, #1a1a1a, #0a0a0a);
      border-radius: 45px;
      transition: transform 0.3s ease;
      box-shadow: 0 4.5px 10px rgba(0, 0, 0, 0.5);
    }

    .thorax {
      top: 67px;
      width: 40px;
      height: 135px;
      z-index: 10;
    }

    .abdomen {
      top: 180px;
      width: 31px;
      height: 157px;
      z-index: 9;
    }

    /* --- ANTENAS --- */
    .antenna {
      position: absolute;
      top: 45px;
      width: 112px;
      height: 112px;
      border: 6.75px solid #0a0a0a;
      border-radius: 50%;
      z-index: 8;
      transition: transform 0.3s ease;
    }

    .antenna.left {
      left: 50%;
      transform: translateX(-100%) rotate(-30deg);
      border-right-color: transparent;
      border-bottom-color: transparent;
    }

    .antenna.right {
      right: 50%;
      transform: translateX(100%) rotate(30deg) scaleX(-1);
      border-right-color: transparent;
      border-bottom-color: transparent;
    }

    /* --- ESTELA DE PARTÍCULAS --- */
    .trail {
      position: absolute;
      width: 18px;
      height: 18px;
      background: radial-gradient(circle, #00f2ff, transparent);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      animation: trailFade 1.5s ease-out forwards;
    }

    /* --- ANIMACIONES --- */
    /* Nueva animación: Aparece, se mantiene y se desvanece en la oscuridad */
    @keyframes appearAndFade {
      0% {
        opacity: 0;
        transform: scale(0.5) translateY(50px);
        filter: brightness(0) saturate(0);
      }
      15% {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: brightness(1) saturate(1);
      }
      60% {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: brightness(1) saturate(1);
      }
      100% {
        opacity: 0;
        transform: scale(0.8) translateY(30px);
        filter: brightness(0) saturate(0);
      }
    }

    @keyframes flap-left {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(70deg); }
    }

    @keyframes flap-right {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(-70deg); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-33px); }
    }

    @keyframes trailFade {
      0% {
        opacity: 1;
        transform: scale(1);
      }
      100% {
        opacity: 0;
        transform: scale(0.2);
      }
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    /* --- PARTÍCULAS DE FONDO --- */
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff;
      opacity: 0;
      animation: twinkle 4s infinite;
      pointer-events: none;
      transition: opacity 1s ease;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: translateY(0); }
      50% { opacity: 0.8; transform: translateY(-30px); }
    }

    /* --- CAPA DE OSCURECIMIENTO FINAL --- */
    .dark-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at center, #0a0a1a, #000000);
      opacity: 0;
      pointer-events: none;
      animation: fadeToDark 8s ease-in-out forwards;
      z-index: 1000;
    }

    @keyframes fadeToDark {
      0%, 50% {
        opacity: 0;
      }
      100% {
        opacity: 1;
      }
    }
  </style>
</head>
<body>

  <!-- Capa que oscurece todo al final de la transición -->
  <div class="dark-overlay"></div>

  <div class="wrapper" id="wrapper">
    <div class="butterfly" id="butterfly">
      <div class="wing-wrapper wing-left">
        <div class="wing-mirror">
          <div class="wing-top"></div>
          <div class="wing-bottom"></div>
        </div>
      </div>
      
      <div class="wing-wrapper wing-right">
        <div class="wing-mirror">
          <div class="wing-top"></div>
          <div class="wing-bottom"></div>
        </div>
      </div>

      <div class="body-part thorax"></div>
      <div class="body-part abdomen"></div>
      
      <div class="antenna left"></div>
      <div class="antenna right"></div>
    </div>
  </div>

  <script>
    const wrapper = document.getElementById('wrapper');
    const butterfly = document.getElementById('butterfly');

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let currentX = mouseX;
    let currentY = mouseY;
    let lastTrailTime = 0;
    let isActive = true; // Control para detener la animación de estelas al finalizar

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    document.addEventListener('touchmove', (e) => {
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    }, { passive: true });

    function createTrail(x, y) {
      const trail = document.createElement('div');
      trail.className = 'trail';
      trail.style.left = (x - 9) + 'px';
      trail.style.top = (y - 9) + 'px';
      document.body.appendChild(trail);
      
      setTimeout(() => trail.remove(), 1500);
    }

    function animate() {
      if (!isActive) return; // Detiene el procesamiento si la transición ya terminó
      
      const now = Date.now();
      
      currentX += (mouseX - currentX) * 0.05;
      currentY += (mouseY - currentY) * 0.05;
      
      const vx = mouseX - currentX;
      const vy = mouseY - currentY;
      const speed = Math.sqrt(vx * vx + vy * vy);
      
      const angle = Math.atan2(vy, vx) * (180 / Math.PI) + 90;
      const bank = vx * 0.2;
      const scale = 1 - Math.min(speed * 0.002, 0.3);
      
      if (now - lastTrailTime > 50 && speed > 2) {
        createTrail(currentX, currentY);
        lastTrailTime = now;
      }

      wrapper.style.transform = `translate(${currentX - 225}px, ${currentY - 225}px)`;
      butterfly.style.transform = `rotate(${angle}deg) rotateZ(${bank}deg) scale(${scale})`;
      
      requestAnimationFrame(animate);
    }

    for(let i = 0; i < 40; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + 'vw';
      particle.style.top = Math.random() * 100 + 'vh';
      particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
      particle.style.animationDelay = Math.random() * 5 + 's';
      document.body.appendChild(particle);
    }

    animate();

    // Detener la generación de estelas y partículas después de que termine la animación (8 segundos)
    setTimeout(() => {
      isActive = false;
      // Opcional: ocultar partículas de fondo también para un negro total
      document.querySelectorAll('.particle').forEach(p => p.style.opacity = '0');
    }, 8000);
  </script>

</body>
</html>
